<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="p-0 m-0 bg-gradient-to-r  from-red-400 via-pink-400 to-rose-500">
  <section>
    <div class="bg-white/90 rounded-xl shadow-xs shadow-gray-300 p-8 justify-center sm:mx-auto mx-4  sm:max-w-lg mt-[100px] space-y-2.5">
      <h1 class="text-3xl font-bold text-center">Tip Calculator</h1>
      <h2 class="text-center mb-7">Enter the bill amount and tip percentage to calculate the total.</h2>
      <form action="">
        <label for="bill-amount">Bill Amount:</label><br>
        <input id="bill-amount" type="number" class="border-2 border-gray-300 w-full my-2 rounded p-1.5">
        <label for="tip-percentage">Tip percentage: </label><br>
        <input id="tip-percentage" type="number" class="border-2 border-gray-300 w-full mt-2 rounded p-1.5">
      </form>
      <button id="calculate" class="w-full p-1.5 hover:bg-red-600 cursor-pointer text-white bg-red-500 rounded mt-3">Calculate</button>
      <h1 class="mt-3">Total: <span id="answer" class="font-bold">0.00</span></h1>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
