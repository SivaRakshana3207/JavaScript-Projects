<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieBook</title>

  <!-- Tailwind CSS -->
  <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="p-0 m-0 bg-[#081229] text-white">
  <nav class=" max-w-md sm:max-w-7xl flex justify-center flex-col sm:flex-row sm:justify-between m-6 text-center space-y-2">
    <h1 class="font-semibold text-xl mb-0.5">MOVIE <span class="text-yellow-500">BOOK</span></h1>
    <p class="sm:hidden text-xs mb-3 text-gray-400">Book Your Perfect Seat Instantly</p>
    <div class="relative w-full sm:w-[300px] lg:w-[500px]">
        <input type="text" placeholder="Search" class="bg-gray-800 p-1.5 rounded w-full outline-none pl-10">
        <svg viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><path fill-rule="evenodd" d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06l-2.755-2.754ZM10.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z" clip-rule="evenodd"></path></svg>
    </div>
    <div class="gap-3 items-center hidden lg:flex">
        <div class="bg-yellow-600 py-1.5 px-4 rounded"><h1>Movies</h1></div>
        <div class="bg-gray-800 py-1.5 px-4 rounded"><h1>TV Shows</h1></div>
        <div class="bg-gray-800 py-1.5 px-4 rounded"><h1>Top Rated</h1></div>
    </div>
    <button class="hidden md:block lg:hidden xl:block items-center bg-yellow-500 shadow rounded px-6 py-1.5 hover:bg-yellow-600 hover:cursor-pointer">Book Now</button>
  </nav>

    <section class="m-5 max-w-md sm:max-w-7xl flex flex-col xl:flex-row">
        <div>
            <img src="./assets/movie-banner.png" alt="" class="rounded w-full xl:w-[800px] items-center">

        </div>
    </section>
  <script src="script.js"></script>
</body>
</html>
